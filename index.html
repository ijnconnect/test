<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Today's Outpatients</title>

<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@500;600;700;800;900&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: #000;
  font-family: "Figtree", Arial, sans-serif;
}

.stage {
  width: 100vw;
  height: 100vh;
  position: relative;
  overflow: hidden;
  background: #00548e;
}

.bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: fill;
  z-index: 0;
}

.content {
  position: absolute;
  top: 15%;
  left: 0;
  width: 100%;
  text-align: center;
  z-index: 2;
  color: #ffffff;
}

.title {
  font-size: clamp(58px, 6.6vw, 76px);
  font-weight: 900;
  margin-bottom: 26px;
}

.date {
  font-size: clamp(40px, 4.6vw, 54px);
  font-weight: 500;
  margin-bottom: 58px;
}

.number {
  font-size: clamp(230px, 25vw, 295px);
  font-weight: 900;
  line-height: 0.9;
  margin-bottom: 52px;
}

.closed-message {
  font-size: clamp(78px, 8.8vw, 112px);
  font-weight: 900;
  line-height: 1.15;
  color: #bfe4ff;
  margin-bottom: 54px;
}

.divider {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 76%;
  max-width: 820px;
  margin: 0 auto 44px;
  gap: 30px;
}

.divider::before,
.divider::after {
  content: "";
  height: 2px;
  flex: 1;
  background: rgba(191, 228, 255, 0.55);
}

.heart-wrap {
  width: 92px;
  height: 92px;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: heartbeat 1.35s infinite ease-in-out;
  filter: drop-shadow(0 0 18px rgba(142, 220, 255, 0.7));
}

.heart-svg {
  width: 92px;
  height: 92px;
}

.ecg-line {
  stroke-dasharray: 180;
  stroke-dashoffset: 180;
  animation: ecgMove 1.35s infinite ease-in-out;
}

@keyframes heartbeat {
  0% { transform: scale(1); }
  14% { transform: scale(1.18); }
  28% { transform: scale(1); }
  42% { transform: scale(1.12); }
  70% { transform: scale(1); }
  100% { transform: scale(1); }
}

@keyframes ecgMove {
  0% { stroke-dashoffset: 180; opacity: 0.4; }
  35% { stroke-dashoffset: 0; opacity: 1; }
  100% { stroke-dashoffset: -180; opacity: 0.5; }
}

.subtitle {
  font-size: clamp(48px, 5.7vw, 66px);
  font-weight: 900;
  color: #bfe4ff;
}

.notice {
  width: 78%;
  max-width: 790px;
  margin: 76px auto 0;
  padding: 24px 30px;
  border-top: 1px solid rgba(191, 228, 255, 0.35);
  border-bottom: 1px solid rgba(191, 228, 255, 0.35);
  display: none;
  align-items: center;
  justify-content: center;
  gap: 24px;
  text-align: left;
}

.notice-icon {
  font-size: 34px;
  color: #8edcff;
  flex-shrink: 0;
}

.notice-text {
  font-size: clamp(26px, 3.2vw, 38px);
  font-weight: 600;
  line-height: 1.35;
  color: #ffffff;
}

body.closed .notice {
  display: flex;
}

.status {
  position: absolute;
  bottom: 32px;
  left: 0;
  width: 100%;
  text-align: center;
  font-size: 16px;
  font-weight: 600;
  color: rgba(255,255,255,0.78);
  z-index: 2;
}
</style>
</head>

<body class="open">

<div class="stage">

  <img 
    class="bg"
    src="https://raw.githubusercontent.com/ijnconnect/todayoutpatient/main/background.png"
    alt=""
  >

  <div class="content">
    <div class="title">Today’s Outpatients</div>
    <div class="date" id="date">Loading...</div>

    <div id="mainDisplay">
      <div class="number">--</div>

      <div class="divider">
        <div class="heart-wrap">
          <svg class="heart-svg" viewBox="0 0 100 100">
            <path 
              d="M50 84 C20 58 10 42 15 27 C20 10 40 13 50 28 C60 13 80 10 85 27 C90 42 80 58 50 84Z"
              fill="#8edcff"
            />
            <polyline 
              class="ecg-line"
              points="24,50 38,50 44,38 52,64 59,46 64,50 76,50"
              fill="none"
              stroke="#ffffff"
              stroke-width="5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
      </div>

      <div class="subtitle">Hearts Served Today</div>
    </div>

    <div class="notice" id="noticeBox">
      <div class="notice-icon">▣</div>
      <div class="notice-text">
        Outpatient services will resume on<br>
        the next working day. Thank you.
      </div>
    </div>
  </div>

  <div class="status" id="status">Connecting to Google Sheet...</div>

</div>

<script>
const SHEET_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vRkSHuwMFhdfcEaQnjFi00S0GtQ5QioagbII8AYPtGbewBsOOm2BoHXNyw2E2fs2vk6dAJm12lvPxah/pub?output=csv";

function clean(value) {
  return value ? String(value).trim() : "";
}

function heartDivider() {
  return `
    <div class="divider">
      <div class="heart-wrap">
        <svg class="heart-svg" viewBox="0 0 100 100">
          <path 
            d="M50 84 C20 58 10 42 15 27 C20 10 40 13 50 28 C60 13 80 10 85 27 C90 42 80 58 50 84Z"
            fill="#8edcff"
          />
          <polyline 
            class="ecg-line"
            points="24,50 38,50 44,38 52,64 59,46 64,50 76,50"
            fill="none"
            stroke="#ffffff"
            stroke-width="5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </div>
    </div>
  `;
}

function parseCSV(text) {
  const rows = text.trim().split(/\r?\n/).map(parseCSVRow);
  const headers = rows.shift().map(clean);

  return rows.map(row => {
    const obj = {};
    headers.forEach((header, index) => {
      obj[header] = clean(row[index]);
    });
    return obj;
  });
}

function parseCSVRow(row) {
  const result = [];
  let current = "";
  let insideQuotes = false;

  for (let i = 0; i < row.length; i++) {
    const char = row[i];

    if (char === '"') {
      insideQuotes = !insideQuotes;
    } else if (char === "," && !insideQuotes) {
      result.push(current);
      current = "";
    } else {
      current += char;
    }
  }

  result.push(current);
  return result;
}

function getToday() {
  return new Date().toLocaleDateString("en-GB", {
    timeZone: "Asia/Kuala_Lumpur",
    day: "2-digit",
    month: "2-digit",
    year: "numeric"
  });
}

function formatDate(dateString) {
  const [day, month, year] = dateString.split("/");
  const date = new Date(`${year}-${month}-${day}T00:00:00+08:00`);

  return date.toLocaleDateString("en-GB", {
    timeZone: "Asia/Kuala_Lumpur",
    day: "numeric",
    month: "long",
    year: "numeric"
  });
}

function renderOpen(total) {
  document.body.className = "open";

  document.getElementById("mainDisplay").innerHTML = `
    <div class="number">${total || "0"}</div>
    ${heartDivider()}
    <div class="subtitle">Hearts Served Today</div>
  `;
}

function renderClosed() {
  document.body.className = "closed";

  document.getElementById("mainDisplay").innerHTML = `
    <div class="closed-message">
      OUTPATIENT<br>
      CLINICS<br>
      CLOSED
    </div>
    ${heartDivider()}
  `;
}

async function loadData() {
  try {
    const response = await fetch(SHEET_URL + "&cache=" + Date.now());
    const csvText = await response.text();
    const data = parseCSV(csvText);

    const today = getToday();
    const todayRow = data.find(row => clean(row["Date"]) === today);

    document.getElementById("date").innerText = formatDate(today);

    if (!todayRow) {
      renderClosed();
      document.getElementById("status").innerText =
        "No data found for today (" + today + ")";
      return;
    }

    const status = clean(todayRow["Status"]).toUpperCase();
    const total = clean(todayRow["Total Outpatient"]);

    if (status === "CLOSED") {
      renderClosed();
    } else {
      renderOpen(total);
    }

    document.getElementById("status").innerText =
      "Last updated: " +
      new Date().toLocaleString("en-MY", {
        timeZone: "Asia/Kuala_Lumpur"
      });

  } catch (error) {
    renderClosed();
    document.getElementById("status").innerText = "Error loading data";
  }
}

loadData();
setInterval(loadData, 300000);
</script>

</body>
</html>
